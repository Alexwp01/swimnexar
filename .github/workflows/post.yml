name: Instagram Bot

on:
  schedule:
    - cron: '0 14 */2 * *'   # Every 2 days at 14:00 UTC (10 AM ET)
  workflow_dispatch:          # Manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Build & preview slides without posting to Instagram'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts
        run: sudo apt-get install -y fonts-liberation

      - name: Install Python dependencies
        run: pip install -r bot/requirements.txt

      - name: Run bot
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          NOTION_TOKEN:           ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:     ${{ secrets.NOTION_DATABASE_ID }}
          DRY_RUN:                ${{ inputs.dry_run && '1' || '' }}
        run: python bot/main.py

      - name: Upload preview slides (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-slides
          path: /tmp/slide_*.jpg

      - name: Commit posted-topics history
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "Swimnexar Instagram Bot"
          git config user.email "bot@swimnexar.com"
          git add bot/posted_topics.json
          git diff --staged --quiet || git commit -m "post: record posted topic"
          git push
